<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>EuScribe1</title>
    <link rel="stylesheet" href="index.css" />
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet" />
  </head>
  <body>
 
    <!-- OVERLAY (mobile drawers) -->
    <div class="mobile-overlay" id="mobileOverlay"></div>
 
    <!-- ================================================
         TOPBAR
         ================================================ -->
    <header class="topbar">
      <div class="left">
        <button class="menu-btn" id="menuBtn">☰</button>
        <div class="logo">Eu<span>Scribe</span></div>
      </div>
      <div class="center">
        <input class="file-title" value="Untitled Document" />
      </div>
      <div class="right">
        <button class="ai" id="aiBtn">✦ AI</button>
        <label class="switch">
          <input type="checkbox" id="themeToggle" />
          <span class="slider" title="Toggle theme"></span>
        </label>
        <div class="profile">
          <input type="checkbox" id="profileToggle" />
          <label for="profileToggle" class="avatar">AG</label>
          <div class="dropdown">
            <div class="user-info"><p>Guest User</p></div>
            <button>Logout</button>
          </div>
        </div>
      </div>
    </header>
 
    <!-- ================================================
         APP SHELL
         ================================================ -->
    <div class="app-shell" id="appShell">
 
      <!-- LEFT SIDEBAR -->
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
          <p class="sidebar-label">Documents</p>
          <button class="btn-new-doc" id="newDocBtn">+ New Document</button>
        </div>
        <div class="search-box">
          <i class="bx bx-search"></i>
          <input id="searchInput" placeholder="Search documents..." />
        </div>
        <div class="file-list" id="fileList"></div>
      </aside>
 
      <!-- MAIN CONTENT -->
      <main class="main-content" id="mainContent">
 
        <div class="subbar">
          <div class="toolbar">
 
            <div class="toolbar-row toolbar-top">
              <input type="text" class="filename-input" placeholder="Filename" value="untitled" id="filename" />
              <select class="toolbar-select" onchange="fileHandle(this.value); this.selectedIndex=0">
                <option value="" selected hidden disabled>File</option>
                <option value="new">New File</option>
                <option value="txt">Save as .txt</option>
                <option value="pdf">Save as .pdf</option>
              </select>
              <select class="toolbar-select" id="formatSelect" onchange="formatDoc('formatBlock', this.value); this.selectedIndex=0">
                <option value="" selected hidden disabled>Format</option>
                <option value="h1">Heading 1</option>
                <option value="h2">Heading 2</option>
                <option value="h3">Heading 3</option>
                <option value="h4">Heading 4</option>
                <option value="h5">Heading 5</option>
                <option value="h6">Heading 6</option>
                <option value="p">Paragraph</option>
              </select>
              <select class="toolbar-select" onchange="formatDoc('fontSize', this.value); this.selectedIndex=0">
                <option value="" selected hidden disabled>Font size</option>
                <option value="1">Extra Small</option>
                <option value="2">Small</option>
                <option value="3">Regular</option>
                <option value="4">Medium</option>
                <option value="5">Large</option>
                <option value="6">Extra Large</option>
                <option value="7">Big</option>
              </select>
              <label class="color-picker">
                <span>Color</span>
                <input type="color" value="#e6edf3" oninput="formatDoc('foreColor', this.value)" />
              </label>
              <label class="color-picker">
                <span>Highlight</span>
                <input type="color" value="#0f1117" oninput="formatDoc('hiliteColor', this.value)" />
              </label>
            </div>
 
            <div class="toolbar-row toolbar-actions">
              <!-- Mobile-only format select injected here by JS -->
              <button class="tool-btn" onclick="formatDoc('undo')" title="Undo"><i class="bx bx-undo"></i></button>
              <button class="tool-btn" onclick="formatDoc('redo')" title="Redo"><i class="bx bx-redo"></i></button>
              <div class="toolbar-divider"></div>
              <button class="tool-btn" onclick="formatDoc('bold')" title="Bold"><i class="bx bx-bold"></i></button>
              <button class="tool-btn" onclick="formatDoc('underline')" title="Underline"><i class="bx bx-underline"></i></button>
              <button class="tool-btn" onclick="formatDoc('italic')" title="Italic"><i class="bx bx-italic"></i></button>
              <button class="tool-btn" onclick="formatDoc('strikeThrough')" title="Strikethrough"><i class="bx bx-strikethrough"></i></button>
              <div class="toolbar-divider"></div>
              <button class="tool-btn" onclick="formatDoc('justifyLeft')" title="Align Left"><i class="bx bx-align-left"></i></button>
              <button class="tool-btn" onclick="formatDoc('justifyCenter')" title="Align Center"><i class="bx bx-align-middle"></i></button>
              <button class="tool-btn" onclick="formatDoc('justifyRight')" title="Align Right"><i class="bx bx-align-right"></i></button>
              <div class="toolbar-divider"></div>
              <button class="tool-btn" onclick="formatDoc('insertOrderedList')" title="Ordered List"><i class="bx bx-list-ol"></i></button>
              <button class="tool-btn" onclick="formatDoc('insertUnorderedList')" title="Unordered List"><i class="bx bx-list-ul"></i></button>
              <div class="toolbar-divider"></div>
              <button class="tool-btn" onclick="addLink()" title="Add Link"><i class="bx bx-link"></i></button>
              <button class="tool-btn" onclick="formatDoc('unlink')" title="Remove Link"><i class="bx bx-unlink"></i></button>
            </div>
 
          </div>
        </div>
 
        <div class="editor-area">
          <div id="content" class="text-editor" contenteditable="true" spellcheck="true" aria-label="Document editor"></div>
        </div>
 
      </main>
 
    </div><!-- end app-shell -->
 
    <!-- ================================================
         AI PANEL
         ================================================ -->
    <aside class="ai-panel" id="aiPanel" aria-label="AI Assistant">
 
      <!-- Mobile drag handle -->
      <div class="ai-drag-handle"></div>
 
      <div class="ai-panel-header">
        <div class="ai-panel-top">
          <h2 class="ai-panel-title">AI Assistant</h2>
          <span class="ai-badge">OFFLINE AI</span>
          <span class="ai-badge">ONLINE AI</span>
        </div>
        <p class="ai-panel-subtitle">Select text, then choose an action</p>
      </div>
 
      <div class="ai-tabs">
        <button class="ai-tab active" data-tab="improve">Improve</button>
        <button class="ai-tab" data-tab="tone">Tone</button>
        <button class="ai-tab" data-tab="custom">Custom</button>
      </div>
 
      <!-- IMPROVE TAB -->
      <div class="ai-panel-body tab-content active" id="improve-tab">
        <p class="ai-section-label">QUICK ACTIONS</p>
        <div class="ai-actions-list">
          <button class="ai-action-card">
            <div class="ai-action-icon"><i class="bx bx-check"></i></div>
            <div class="ai-action-text">
              <span class="ai-action-title">Fix Grammar & Spelling</span>
              <span class="ai-action-desc">Correct errors and polish text</span>
            </div>
          </button>
          <button class="ai-action-card">
            <div class="ai-action-icon"><i class="bx bx-refresh"></i></div>
            <div class="ai-action-text">
              <span class="ai-action-title">Rewrite for Clarity</span>
              <span class="ai-action-desc">Improve flow and readability</span>
            </div>
          </button>
          <button class="ai-action-card">
            <div class="ai-action-icon"><i class="bx bx-list-check"></i></div>
            <div class="ai-action-text">
              <span class="ai-action-title">Summarize</span>
              <span class="ai-action-desc">Condense to key points</span>
            </div>
          </button>
          <button class="ai-action-card">
            <div class="ai-action-icon"><i class="bx bx-expand-alt"></i></div>
            <div class="ai-action-text">
              <span class="ai-action-title">Expand & Elaborate</span>
              <span class="ai-action-desc">Add more detail and depth</span>
            </div>
          </button>
        </div>
      </div>
 
      <!-- TONE TAB -->
      <div class="ai-panel-body tab-content" id="tone-tab">
        <p class="ai-section-label">TONE OPTIONS</p>
        <div class="ai-actions-list">
          <button class="ai-action-card"><div class="ai-action-text"><span class="ai-action-title">Formal</span><span class="ai-action-desc">Professional and official writing</span></div></button>
          <button class="ai-action-card"><div class="ai-action-text"><span class="ai-action-title">Casual</span><span class="ai-action-desc">Relaxed and simple wording</span></div></button>
          <button class="ai-action-card"><div class="ai-action-text"><span class="ai-action-title">Academic</span><span class="ai-action-desc">Structured and scholarly style</span></div></button>
          <button class="ai-action-card"><div class="ai-action-text"><span class="ai-action-title">Friendly</span><span class="ai-action-desc">Warm and conversational tone</span></div></button>
          <button class="ai-action-card"><div class="ai-action-text"><span class="ai-action-title">Persuasive</span><span class="ai-action-desc">Strong and convincing language</span></div></button>
          <button class="ai-action-card"><div class="ai-action-text"><span class="ai-action-title">Creative</span><span class="ai-action-desc">Expressive and imaginative writing</span></div></button>
        </div>
      </div>
 
      <!-- CUSTOM TAB -->
      <div class="ai-panel-body tab-content" id="custom-tab">
        <p class="ai-section-label">CUSTOM AI CHAT</p>
        <div class="ai-actions-list">
          <button class="ai-action-card">
            <div class="ai-action-text">
              <span class="ai-action-title">Ask Anything</span>
              <span class="ai-action-desc">Tell AI exactly what you want it to do</span>
            </div>
          </button>
        </div>
        <div class="ai-chat-input">
          <textarea id="aiInput" placeholder="Ask AI to write, edit, explain, summarize..." rows="4"></textarea>
          <button class="ai-send-btn">
            <i class="bx bx-send"></i>
            <span>Send</span>
          </button>
        </div>
      </div>
 
    </aside>
 
    <!-- ================================================
         MOBILE BOTTOM NAV
         ================================================ -->
    <nav class="mobile-bottom-nav" id="mobileBottomNav">
      <button class="mob-nav-btn" data-view="docs">
        <i class="bx bx-file-blank"></i>
        <span>Docs</span>
      </button>
      <button class="mob-nav-btn active" data-view="write">
        <i class="bx bx-edit"></i>
        <span>Write</span>
      </button>
      <button class="mob-nav-btn" data-view="ai">
        <i class="bx bx-brain"></i>
        <span>AI</span>
      </button>
    </nav>
 
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js" integrity="sha512-GsLlZN/3F2ErC5ifS5QtgpiJtWd43JWSuIgh7mbzZ8zBps+dvLusV+eNQATqgA/HdeKFVgA5v3S/cIrLF7QnIg==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="index.js"></script>
  </body>
</html>
